name: Bug report
description: Report incorrect TenantProof behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, customer data, or private repository content.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What did TenantProof report?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a sanitized migration or fixture where possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TenantProof version
      placeholder: 0.1.0
    validations:
      required: true

